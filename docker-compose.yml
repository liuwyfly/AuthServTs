# Docker Swarm Stack for AuthServTs
# Usage: docker stack deploy -c docker-compose.yml ai100
#
# NOTE: This stack uses an external Aliyun RDS MySQL database.
#       No MySQL container is deployed inside the Swarm.

networks:
  authserv-network:
    driver: overlay
    attachable: true

# Ensure cert files exist on the Swarm manager host:
# /opt/webcert/ai100.me.pem
# /opt/webcert/ai100.me.key

secrets:
  jwt_secret:
    external: true
  mysql_host:
    external: true
  mysql_user:
    external: true
  mysql_password:
    external: true
  register_validation_code:
    external: true

services:
  # ------------------------------------------------------------------
  # Reverse Proxy / Load Balancer
  # ------------------------------------------------------------------
  traefik:
    image: traefik:v3.6.1
    environment:
      - DOCKER_API_VERSION=1.40
    command:
      - "--api.dashboard=false"
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic/tls.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    ports:
      - target: 80
        published: 80
        mode: ingress
      - target: 443
        published: 443
        mode: ingress
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: bind
        source: /opt/webcert
        target: /certs
        read_only: true
      - type: bind
        source: ./deploy/traefik/tls.yml
        target: /etc/traefik/dynamic/tls.yml
        read_only: true
    networks:
      - authserv-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"
        env: "OS_VERSION"

  # ------------------------------------------------------------------
  # AuthServTs Application
  # ------------------------------------------------------------------
  auth-serv:
    image: ht-repo-registry.cn-heyuan.cr.aliyuncs.com/ht-elite/auth-serv:1.0.3
    environment:
      - FASTIFY_PORT=3000
      - FASTIFY_ADDRESS=0.0.0.0
      - FASTIFY_LOG_LEVEL=info
      - FASTIFY_CLOSE_GRACE_DELAY=5000
      - FASTIFY_ROUTE_PREFIX=/auth-serv
      # --- Aliyun RDS MySQL connection ---
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=lagrange
      # --- Secrets ---
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - MYSQL_HOST_FILE=/run/secrets/mysql_host
      - MYSQL_USER_FILE=/run/secrets/mysql_user
      - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
      - REGISTER_VALIDATION_CODE_FILE=/run/secrets/register_validation_code
      # --- Timezone ---
      - TZ=Asia/Shanghai
    secrets:
      - jwt_secret
      - mysql_host
      - mysql_user
      - mysql_password
      - register_validation_code
    networks:
      - authserv-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/auth-serv/ping', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 60s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        # AuthServTs 自身处理路由前缀，Traefik 只负责按前缀转发。
        - "traefik.http.routers.authserv.rule=Host(`api.ai100.me`) && PathPrefix(`/auth-serv`)"
        - "traefik.http.routers.authserv.entrypoints=web,websecure"
        - "traefik.http.routers.authserv.tls=true"
        - "traefik.http.routers.authserv.priority=100"
        - "traefik.http.services.authserv.loadbalancer.server.port=3000"
        - "traefik.http.services.authserv.loadbalancer.healthcheck.path=/auth-serv/ping"
        - "traefik.http.services.authserv.loadbalancer.healthcheck.interval=10s"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"
        env: "OS_VERSION"

  # ------------------------------------------------------------------
  # MathLearning Application
  # ------------------------------------------------------------------
  math-learning:
    image: ht-repo-registry.cn-heyuan.cr.aliyuncs.com/ht-elite/math-learning:1.0.0
    environment:
      - FASTIFY_PORT=3000
      - FASTIFY_ADDRESS=0.0.0.0
      - FASTIFY_LOG_LEVEL=info
      - FASTIFY_CLOSE_GRACE_DELAY=5000
      - FASTIFY_ROUTE_PREFIX=/math-learning
      # --- Timezone ---
      - TZ=Asia/Shanghai
    networks:
      - authserv-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/ping', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 60s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.math-learning.rule=Host(`api.ai100.me`) && PathPrefix(`/math-learning`)"
        - "traefik.http.routers.math-learning.entrypoints=web,websecure"
        - "traefik.http.routers.math-learning.tls=true"
        - "traefik.http.routers.math-learning.priority=100"
        - "traefik.http.routers.math-learning.middlewares=math-learning-strip-prefix"
        - "traefik.http.middlewares.math-learning-strip-prefix.stripprefix.prefixes=/math-learning"
        - "traefik.http.services.math-learning.loadbalancer.server.port=3000"
        - "traefik.http.services.math-learning.loadbalancer.healthcheck.path=/ping"
        - "traefik.http.services.math-learning.loadbalancer.healthcheck.interval=10s"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"
        env: "OS_VERSION"
